<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог — ProBur</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <img src="icons/logo-probur.svg" alt="ProBur" />
    </a>

    <nav class="nav">
      <a href="catalog.html">Каталог</a>
      <a href="delivery.html">Доставка</a>
      <a href="about.html">О сервисе</a>
      <a href="contacts.html">Контакты</a>
    </nav>

    <div class="header-actions" id="headerActions"></div>
  </div>
</header>

<section class="page bg-catalog">
  <div class="page-overlay">
    <div class="container">
      <div class="page-head">
        <div>
          <h1>Каталог инструментов</h1>
          <p>Выберите инструмент для ремонта квартиры и добавьте в корзину</p>
        </div>
      </div>

      <div class="catalog-panel">
        <div class="catalog-filters">
          <button class="filter-btn active" data-filter="all">Все</button>
          <button class="filter-btn" data-filter="Перфораторы">Перфораторы</button>
          <button class="filter-btn" data-filter="Дрели">Дрели</button>
          <button class="filter-btn" data-filter="Шлифмашины">Шлифмашины</button>
          <button class="filter-btn" data-filter="Лобзики">Лобзики</button>
          <button class="filter-btn" data-filter="Миксеры">Миксеры</button>
        </div>

        <div class="catalog-search">
          <input type="text" id="searchInput" placeholder="Поиск инструмента..." />
        </div>
      </div>

      <div class="products-grid" id="productsGrid"></div>
    </div>
  </div>
</section>

<script src="js/header.js"></script>
<script src="js/app.js"></script>
</body>
</html>
